<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEMETRY FORGE // Retro Sci-Fi Widget Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&family=VT323&display=swap" rel="stylesheet">
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body class="crt-enabled">
    <div class="crt-overlay"></div>
    <div class="crt-scanline"></div>

    <div id="app" class="app-container">
        <header class="app-header">
            <div class="header-left">
                <i data-lucide="terminal" class="header-icon"></i>
                <h1 class="glow-text">TELEMETRY FORGE</h1>
            </div>
            <div class="header-status">
                <span class="status-item"><span class="status-indicator online"></span> SYS ONLINE</span>
                <span class="status-item"><span class="status-indicator"></span> RENDER STABLE</span>
                <span class="status-item"><span class="status-indicator"></span> EXPORT READY</span>
            </div>
            <div class="header-right">
                <select id="theme-selector" class="terminal-select">
                    <option value="phosphor-green">PHOSPHOR GREEN</option>
                    <option value="amber-classic">AMBER CLASSIC</option>
                    <option value="cyan-protocol">CYAN PROTOCOL</option>
                    <option value="combat-red">COMBAT RED</option>
                </select>
            </div>
        </header>

        <main class="app-main">
            <aside class="panel left-panel">
                <div class="panel-header">WIDGET LIBRARY</div>
                <div class="library-content" id="widget-library">
                    <!-- Library categories and items will be injected by JS -->
                </div>
            </aside>

            <section class="center-panel">
                <div class="canvas-header">
                    <div class="canvas-title">PREVIEW_CANVAS</div>
                    <div class="canvas-actions">
                        <button id="clear-canvas" class="terminal-button small">CLEAR</button>
                        <button id="reset-demo" class="terminal-button small">RESET DEMO</button>
                    </div>
                </div>
                <div class="preview-canvas" id="preview-canvas">
                    <!-- Widgets will be rendered here -->
                </div>
            </section>

            <aside class="panel right-panel">
                <div class="panel-header">INSPECTOR</div>
                <div id="inspector-content" class="inspector-content">
                    <div class="empty-state">SELECT A WIDGET TO EDIT PROPERTIES</div>
                </div>
            </aside>
        </main>

        <footer class="app-footer">
            <div class="panel-header export-header">
                <span>CODE EXPORT</span>
                <div class="export-actions">
                    <button id="copy-code" class="terminal-button">COPY CODE</button>
                    <button id="download-html" class="terminal-button">DOWNLOAD HTML</button>
                </div>
            </div>
            <div class="export-container">
                <div class="export-tabs">
                    <button class="tab-button active" data-tab="combined">COMBINED</button>
                    <button class="tab-button" data-tab="html">HTML</button>
                    <button class="tab-button" data-tab="css">CSS</button>
                    <button class="tab-button" data-tab="js">JS</button>
                </div>
                <div class="export-content">
                    <pre><code id="export-code-block"></code></pre>
                </div>
            </div>
        </footer>
    </div>

    <script type="module" src="/src/app.js"></script>
    <script>
        // Initialize Lucide icons
        window.addEventListener('load', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
